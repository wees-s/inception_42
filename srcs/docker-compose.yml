volumes:
        mariadb:
                name: mariadb
                driver: local
                driver_opts:
                            device: /home/wedos-sa/data/mariadb
                            o: bind
                            type: none
networks:
        inception:
                  name: inception

services:
        nginx:
              container_name: nginx
              build: ./requirements/nginx/.
              ports:
                    - "443:443"
              networks:
                      - inception
              restart: always
        mariadb:
                container_name: mariadb
                build: ./requirements/mariadb/.
                volumes:
                        - mariadb:/var/lib/mysql
                networks:
                        - inception
                restart: always
